apiVersion: v1
kind: Secret
metadata:
  name: tasklane-secrets
type: Opaque
stringData:
  jwt-secret: tasklane-kubernetes-demo-secret-change-before-production-2026
  admin-password: Admin@123
  user-password: Demo@123
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: tasklane-mongodb-data
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tasklane-mongodb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tasklane-mongodb
  template:
    metadata:
      labels:
        app: tasklane-mongodb
    spec:
      containers:
        - name: mongodb
          image: mongo:7
          ports:
            - containerPort: 27017
          volumeMounts:
            - name: data
              mountPath: /data/db
          readinessProbe:
            exec:
              command: ["mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: tasklane-mongodb-data
---
apiVersion: v1
kind: Service
metadata:
  name: tasklane-mongodb
spec:
  selector:
    app: tasklane-mongodb
  ports:
    - port: 27017
      targetPort: 27017
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tasklane-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tasklane-api
  template:
    metadata:
      labels:
        app: tasklane-api
    spec:
      containers:
        - name: api
          image: arunodhai/tasklane-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: MONGODB_URI
              value: mongodb://tasklane-mongodb:27017/tasklane
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: tasklane-secrets
                  key: jwt-secret
            - name: DEMO_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: tasklane-secrets
                  key: admin-password
            - name: DEMO_USER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: tasklane-secrets
                  key: user-password
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: backend
spec:
  selector:
    app: tasklane-api
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tasklane-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tasklane-web
  template:
    metadata:
      labels:
        app: tasklane-web
    spec:
      containers:
        - name: web
          image: arunodhai/tasklane-web:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: tasklane-web
spec:
  type: NodePort
  selector:
    app: tasklane-web
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080
