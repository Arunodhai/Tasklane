spring:
  application:
    name: tasklane-api
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/tasklane}

tasklane:
  jwt:
    secret: ${JWT_SECRET:tasklane-local-development-secret-change-before-production-2026}
    expiration-hours: ${JWT_EXPIRATION_HOURS:12}
  demo-data:
    enabled: ${DEMO_DATA_ENABLED:true}
    admin-email: ${DEMO_ADMIN_EMAIL:admin@tasklane.local}
    admin-password: ${DEMO_ADMIN_PASSWORD:Admin@123}
    user-email: ${DEMO_USER_EMAIL:demo@tasklane.local}
    user-password: ${DEMO_USER_PASSWORD:Demo@123}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
